root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/app ./cmd/api"
  bin = "tmp/app"
  delay = 500
  exclude_dir = ["tmp", "logs", "bin", "dist", ".git", ".idea", "node_modules"]
  include_ext = ["go", "sql", "yaml", "yml", "tmpl"]
  kill_delay = "5s"
  stop_on_error = true

[log]
  time = true

[color]
  app = "cyan"
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "blue"
